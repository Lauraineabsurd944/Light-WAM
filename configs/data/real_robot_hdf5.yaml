train:
  _target_: lightwam.datasets.lerobot.hdf5_robot_video_dataset.HDF5RobotVideoDataset
  dataset_dirs:
    - ./data/real_robot_hdf5/default_task
  shape_meta:
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.05
  is_training_set: true
  pretrained_norm_stats: null
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  use_latent_cache: false
  latent_cache_dir: null
  processor:
    _target_: lightwam.datasets.lerobot.processors.lightwam_processor.LightWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14
    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null
    action_state_merger:
      _target_: lightwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: lightwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: lightwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/real_robot_hdf5
  text_embedding_model_id: Wan-AI/Wan2.1-T2V-1.3B
  context_len: 128

val:
  _target_: lightwam.datasets.lerobot.hdf5_robot_video_dataset.HDF5RobotVideoDataset
  dataset_dirs:
    - ./data/real_robot_hdf5/default_task
  shape_meta: ${data.train.shape_meta}
  num_frames: ${data.train.num_frames}
  global_sample_stride: ${data.train.global_sample_stride}
  action_video_freq_ratio: ${data.train.action_video_freq_ratio}
  video_size: ${data.train.video_size}
  camera_key: null
  val_set_proportion: ${data.train.val_set_proportion}
  is_training_set: false
  pretrained_norm_stats: null
  skip_padding_as_possible: false
  concat_multi_camera: ${data.train.concat_multi_camera}
  use_latent_cache: false
  latent_cache_dir: null
  processor:
    _target_: lightwam.datasets.lerobot.processors.lightwam_processor.LightWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14
    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null
    action_state_merger:
      _target_: lightwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: lightwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: lightwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ${data.train.text_embedding_cache_dir}
  text_embedding_model_id: ${data.train.text_embedding_model_id}
  context_len: ${data.train.context_len}
